<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зарплатний Календар ₴</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col justify-between antialiased">

    <header class="bg-blue-600 text-white p-4 text-center text-xl font-bold shadow-md sticky top-0 z-50">
        Зарплатний Календар ₴
    </header>

    <main class="flex-grow p-4 max-w-md w-full mx-auto space-y-4">
        
        <div id="calendar-screen" class="hidden">
            <div class="p-4 text-center text-gray-500 bg-white rounded-xl shadow-md">
                <h2 class="text-xl font-bold text-gray-800 mb-2">Календар змін</h2>
                <p class="text-sm">Інтерактивна сітка календаря знаходиться в розробці.</p>
            </div>
        </div>

        <div id="reports-screen" class="block bg-white p-4 rounded-xl shadow-md space-y-4">
            <h2 class="text-xl font-bold text-gray-800 text-center">Фінансовий Звіт</h2>
            
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-xs text-gray-500 font-medium mb-1">З (дата)</label>
                    <input type="date" id="start-date" class="w-full border border-gray-300 p-2 rounded-lg text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>
                <div>
                    <label class="block text-xs text-gray-500 font-medium mb-1">По (дата)</label>
                    <input type="date" id="end-date" class="w-full border border-gray-300 p-2 rounded-lg text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>
            </div>

            <div class="border-t border-gray-100 pt-4 space-y-3 text-gray-700 text-sm">
                <div class="flex justify-between items-center">
                    <span>Відпрацьовано днів:</span>
                    <span id="stat-days" class="font-semibold text-base text-gray-900">0</span>
                </div>
                <div class="flex justify-between items-center">
                    <span>Відпрацьовано годин:</span>
                    <span id="stat-hours" class="font-semibold text-base text-gray-900">0 год.</span>
                </div>
                <div class="flex justify-between items-center">
                    <span>Нараховано (Брутто):</span>
                    <span id="stat-gross" class="font-semibold text-base text-green-600">0.00 ₴</span>
                </div>
                <div class="flex justify-between items-center text-lg font-bold border-t border-gray-100 pt-3">
                    <span class="text-gray-800">До виплати (Нетто):</span>
                    <span id="stat-net" class="text-blue-600">0.00 ₴</span>
                </div>
                <div class="flex justify-between items-center text-xs text-orange-600 font-medium bg-orange-50 p-2 rounded-lg">
                    <span>З них понаднормові (після 8 год):</span>
                    <span id="stat-overtime">0.00 ₴</span>
                </div>
            </div>
        </div>

        <div class="text-center pt-2">
            <button id="btn-add-demo" class="w-full bg-green-500 text-white py-3 rounded-xl shadow-md hover:bg-green-600 active:scale-98 transition-all font-semibold text-base cursor-pointer">
                + Додати тестову зміну на сьогодні
            </button>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 flex justify-around p-3 shadow-lg sticky bottom-0 z-50">
        <button id="tab-calendar" class="flex flex-col items-center justify-center transition-colors text-gray-400 w-1/2 py-1 cursor-pointer">
            <span class="text-xl">📅</span>
            <span class="text-xs mt-1 font-medium">Календар</span>
        </button>
        <button id="tab-reports" class="flex flex-col items-center justify-center transition-colors text-blue-600 font-bold w-1/2 py-1 cursor-pointer">
            <span class="text-xl">📊</span>
            <span class="text-xs mt-1 font-medium">Звіти</span>
        </button>
    </footer>

    <script src="app.js"></script>
</body>
</html>
